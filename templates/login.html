<!DOCTYPE html>
<html lang="id" data-theme="{{ app_settings.get('theme', 'light') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk Ke HokiApp — POS Penyetan Hoki</title>
  <meta name="description" content="Login ke sistem manajemen Warung Penyetan Hoki">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-page">

  <!-- Drifting background elements -->
  <div class="auth-bg-blob auth-bg-blob-1"></div>
  <div class="auth-bg-blob auth-bg-blob-2"></div>
  <div class="auth-bg-blob auth-bg-blob-3"></div>

  <!-- Login Card Container -->
  <div class="login-container">
    <div class="login-card">
      <!-- Top Decorative Bar -->
      <div class="login-accent-bar"></div>

      <!-- Header / Branding -->
      <div class="login-card-header">
        <div class="logo-wrapper">
          <div class="logo-glow"></div>
          <div class="login-logo">
            {% if app_settings.get('logo_data') %}
              <img src="{{ app_settings.get('logo_data') }}" alt="Logo" style="width:100%;height:100%;object-fit:cover;border-radius:50%">
            {% else %}
              <span class="material-symbols-outlined">storefront</span>
            {% endif %}
          </div>
        </div>
        <div class="brand-text">
          <h1 class="login-app-name">Hoki<span>App</span></h1>
          <p class="login-app-sub">Sistem POS Warung Penyetan & Es Teh Hoki</p>
        </div>
      </div>

      <!-- Form Area -->
      <div class="login-form-area">
        {% if error %}
        <div class="error-banner">
          <div class="error-icon-box">
            <span class="material-symbols-outlined">warning_amber</span>
          </div>
          <span class="error-message">{{ error }}</span>
        </div>
        {% endif %}

        <form class="login-form" method="POST" action="{{ url_for('login') }}">
          <!-- Username Field -->
          <div class="form-group">
            <label class="form-label" for="username">ID Admin / Username</label>
            <div class="input-group">
              <span class="material-symbols-outlined input-prefix">badge</span>
              <input
                class="form-input has-prefix"
                type="text"
                id="username"
                name="username"
                placeholder="Masukkan username"
                autocomplete="username"
                required
                value="{{ request.form.get('username', '') }}"
              >
            </div>
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-group password-wrapper">
              <span class="material-symbols-outlined input-prefix">lock</span>
              <input
                class="form-input has-prefix"
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              >
              <div class="password-toggle" id="passwordToggle" title="Tampilkan/sembunyikan password">
                <span class="material-symbols-outlined icon-sm" id="passwordToggleIcon">visibility_off</span>
              </div>
            </div>
          </div>

          <!-- Actions Row -->
          <div class="login-actions">
            <label class="remember-me">
              <input type="checkbox" name="remember_me" id="rememberMe">
              <span class="checkbox-custom"></span>
              <span class="remember-text">Ingat saya di perangkat ini</span>
            </label>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-login" id="loginBtn">
            <span class="btn-text">MASUK KE SISTEM</span>
            <span class="material-symbols-outlined btn-icon">arrow_forward</span>
          </button>
        </form>
      </div>

      <!-- Footer Info -->
      <div class="login-card-footer">
        <span class="material-symbols-outlined">verified_user</span>
        <span>Sistem Offline Lokal • Enkripsi Sesi Aman</span>
      </div>
    </div>
  </div>

  <script>
    // Password visibility toggle
    const toggle = document.getElementById('passwordToggle');
    const pwInput = document.getElementById('password');
    const pwIcon  = document.getElementById('passwordToggleIcon');
    if (toggle) {
      toggle.addEventListener('click', () => {
        const isHidden = pwInput.type === 'password';
        pwInput.type = isHidden ? 'text' : 'password';
        pwIcon.textContent = isHidden ? 'visibility' : 'visibility_off';
      });
    }

    // Loading state during form submit
    const loginBtn = document.getElementById('loginBtn');
    const loginForm = document.querySelector('.login-form');
    if (loginForm) {
      loginForm.addEventListener('submit', () => {
        loginBtn.classList.add('loading');
        loginBtn.disabled = true;
        loginBtn.innerHTML = `
          <div class="spinner-circle"></div>
          <span>MEMPROSES MASUK...</span>
        `;
      });
    }
  </script>
</body>
</html>
